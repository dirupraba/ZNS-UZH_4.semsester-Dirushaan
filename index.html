function mische(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    let pool = kat === "alle" ? ALLE_FRAGEN : ALLE_FRAGEN.filter(f => f.k === kat);

      <div style={s.wrap}>
        <h2 style={{fontSize:20,marginBottom:16,color:"#c8b090"}}>📚 Themenübersicht</h2>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {THEMEN.map(t=>(
            <div key={t.id} onClick={()=>{setAktivesThema(t);setAktiveSek(null);setSeite("detail");}} style={s.karte(t.farbe)}>
              <div style={{fontSize:26,marginBottom:4}}>{t.emoji}</div>
              <div style={{fontSize:15,fontWeight:"bold",color:t.farbe}}>{t.titel}</div>
              <div style={{fontSize:11,color:C.sub,marginTop:2}}>{t.sektionen.length} Sektionen · {t.sektionen.reduce((a,s)=>a+s.punkte.length,0)} Punkte</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  // THEMA DETAIL
  if (seite==="detail" && aktivesThema) return (
    <div style={s.page}>
      <NavBar/>
      <div style={s.wrap}>
        <button style={{...s.btn("#333"),marginBottom:16,fontSize:12}} onClick={()=>{setSeite("uebersicht");setAktivesThema(null);}}>← Zurück</button>
        <div style={{fontSize:30,marginBottom:6}}>{aktivesThema.emoji}</div>
        <h2 style={{fontSize:22,color:aktivesThema.farbe,margin:"0 0 4px"}}>{aktivesThema.titel}</h2>
        <p style={{color:C.sub,fontSize:12,margin:"0 0 20px"}}>{aktivesThema.sektionen.reduce((a,s)=>a+s.punkte.length,0)} Kernpunkte in {aktivesThema.sektionen.length} Sektionen</p>

        <div style={{marginBottom:16,display:"flex",gap:8,flexWrap:"wrap"}}>
          <button style={{...s.btn("#222"),fontSize:11}} onClick={()=>setAktiveSek(null)}>Alle anzeigen</button>
          {aktivesThema.sektionen.map((sek,i)=>(
            <button key={i} style={{...s.btn(aktiveSek===i?"#333":"#222",aktiveSek===i),fontSize:11,borderColor:aktiveSek===i?aktivesThema.farbe:"rgba(255,255,255,0.1)"}} onClick={()=>setAktiveSek(aktiveSek===i?null:i)}>{sek.titel}</button>
          ))}
        </div>

        {aktivesThema.sektionen.filter((_,i)=>aktiveSek===null||aktiveSek===i).map((sek,si)=>(
          <div key={si} style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:"bold",color:aktivesThema.farbe,letterSpacing:"0.05em",marginBottom:10,paddingBottom:6,borderBottom:`1px solid ${aktivesThema.farbe}30`}}>
              {sek.titel}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {sek.punkte.map((p,pi)=>(
                <div key={pi} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
                  <span style={{color:aktivesThema.farbe,minWidth:20,fontSize:11,fontWeight:"bold",paddingTop:2}}>{String(pi+1).padStart(2,"0")}</span>
                  <span style={{fontSize:13,lineHeight:"1.6",color:"#d0c8b8"}}>{p}</span>
                </div>
              ))}
            </div>
          </div>
        ))}

        <div style={{marginTop:20,padding:14,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,textAlign:"center"}}>
          <button style={{...s.btn("#1e4a2a"),fontSize:13,padding:"9px 22px"}} onClick={()=>starteQuiz(aktivesThema.id,15)}>
            🎯 Quiz zu diesem Thema starten ({ALLE_FRAGEN.filter(f=>f.k===aktivesThema.id).length} Fragen)
          </button>
        </div>
      </div>
    </div>
  );

  // QUIZ SETUP
  if (seite==="quiz_setup") return (
    <div style={s.page}>
      <NavBar/>
      <div style={s.wrap}>
        <h2 style={{fontSize:20,marginBottom:20,color:"#c8b090"}}>🎯 Quiz konfigurieren</h2>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:16}}>
          <div style={{fontSize:13,color:C.sub,marginBottom:10}}>Kategorie:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            <button style={{...s.btn("#1e3a5f",quizKat==="alle"),fontSize:11,borderColor:quizKat==="alle"?"#5b8dee":"rgba(255,255,255,0.1)"}} onClick={()=>setQuizKat("alle")}>Alle ({ALLE_FRAGEN.length})</button>
            {THEMEN.map(t=>(
              <button key={t.id} style={{...s.btn(`${t.farbe}20`,quizKat===t.id),fontSize:11,borderColor:quizKat===t.id?t.farbe:"rgba(255,255,255,0.1)"}} onClick={()=>setQuizKat(t.id)}>
                {t.emoji} {t.titel} ({ALLE_FRAGEN.filter(f=>f.k===t.id).length})
              </button>
            ))}
          </div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,marginBottom:20}}>
          <div style={{fontSize:13,color:C.sub,marginBottom:10}}>Anzahl Fragen:</div>
          <div style={{display:"flex",gap:8}}>
            {[10,15,20,30,"alle"].map(n=>{
              const pool = quizKat==="alle"?ALLE_FRAGEN:ALLE_FRAGEN.filter(f=>f.k===quizKat);
              const max = pool.length;
              const val = n==="alle"?max:Math.min(n,max);
              return <button key={n} style={{...s.btn("#222",quizAnzahl===val),fontSize:11,borderColor:quizAnzahl===val?"#5b8dee":"rgba(255,255,255,0.1)"}} onClick={()=>setQuizAnzahl(val)}>{n==="alle"?`Alle (${max})`:n}</button>;
            })}
          </div>
        </div>
        <button style={{...s.btn("#1e4a2a"),fontSize:15,padding:"12px 32px",width:"100%",cursor:"pointer"}} onClick={()=>starteQuiz(quizKat,quizAnzahl)}>
          Quiz starten →
        </button>
      </div>
    </div>
  );

  // QUIZ
  if (seite==="quiz" && !fertig && aktFrage) {
    const themaInfo = THEMEN.find(t=>t.id===aktFrage.k);
    return (
      <div style={s.page}>
        <NavBar/>
        <div style={s.wrap}>
          <div style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12,color:C.sub}}>
              <span>Frage {qIdx+1} / {quizFragen.length}</span>
              <span style={{color:"#2ecc71"}}>✓ {punkte} richtig</span>
            </div>
            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:4}}>
              <div style={{background:"linear-gradient(90deg,#2ecc71,#5b8dee)",borderRadius:99,height:"100%",width:`${(qIdx/quizFragen.length)*100}%`,transition:"width 0.3s"}}/>
            </div>
            {themaInfo && <div style={{marginTop:8,fontSize:11,color:themaInfo.farbe}}>{themaInfo.emoji} {themaInfo.titel}</div>}
          </div>

          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:22,marginBottom:14}}>
            <div style={{fontSize:11,color:C.sub,letterSpacing:"0.1em",marginBottom:10,textTransform:"uppercase"}}>Frage</div>
            <p style={{fontSize:16,lineHeight:"1.6",margin:0}}>{aktFrage.f}</p>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {aktFrage.a.map((ans,i)=>{
              let bg=C.card, border=C.border, tc=C.sub;
              if(gewaehlt!==null){
                if(i===aktFrage.r){bg="rgba(46,204,113,0.15)";border="#2ecc71";tc="#2ecc71";}
                else if(i===gewaehlt){bg="rgba(231,76,60,0.15)";border="#e74c3c";tc="#e74c3c";}
              }
              return (
                <div key={i} onClick={()=>{if(gewaehlt!==null)return;setGewaehlt(i);if(i===aktFrage.r)setPunkte(p=>p+1);}} style={{background:bg,border:`1px solid ${border}`,borderRadius:10,padding:"12px 16px",cursor:gewaehlt!==null?"default":"pointer",transition:"all 0.15s",display:"flex",gap:12,alignItems:"flex-start"}}>
                  <span style={{color:tc,fontWeight:"bold",minWidth:18,fontSize:13,paddingTop:1}}>
                    {gewaehlt!==null?(i===aktFrage.r?"✓":i===gewaehlt?"✗":String.fromCharCode(65+i)):String.fromCharCode(65+i)}
                  </span>
                  <span style={{color:tc,fontSize:13,lineHeight:"1.5"}}>{ans}</span>
                </div>
              );
            })}
          </div>

          {gewaehlt!==null && (
            <div style={{marginTop:16,display:"flex",justifyContent:"flex-end"}}>
              <button style={{...s.btn("#1e3a5f"),fontSize:14,padding:"10px 24px"}} onClick={()=>{
                if(qIdx+1>=quizFragen.length){setFertig(true);}
                else{setQIdx(i=>i+1);setGewaehlt(null);}
              }}>
                {qIdx+1>=quizFragen.length?"Ergebnis anzeigen →":"Nächste →"}
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // QUIZ ERGEBNIS
  if (seite==="quiz" && fertig) return (
    <div style={s.page}>
      <NavBar/>
      <div style={{...s.wrap,textAlign:"center",paddingTop:40}}>
        <div style={{fontSize:56,marginBottom:14}}>{prozentzahl>=80?"🏆":prozentzahl>=60?"👍":"📖"}</div>
        <h2 style={{fontSize:26,margin:"0 0 8px"}}>Quiz abgeschlossen!</h2>
        <p style={{color:C.sub,margin:"0 0 24px"}}>Du hast {punkte} von {quizFragen.length} Fragen richtig.</p>
        <div style={{display:"inline-block",background:prozentzahl>=80?"rgba(46,204,113,0.15)":prozentzahl>=60?"rgba(241,196,15,0.15)":"rgba(231,76,60,0.15)",border:`2px solid ${prozentzahl>=80?"#2ecc71":prozentzahl>=60?"#f1c40f":"#e74c3c"}`,borderRadius:12,padding:"14px 30px",marginBottom:28}}>
          <div style={{fontSize:40,fontWeight:"bold",color:prozentzahl>=80?"#2ecc71":prozentzahl>=60?"#f1c40f":"#e74c3c"}}>{prozentzahl}%</div>
          <div style={{fontSize:13,color:C.sub}}>{prozentzahl>=80?"Ausgezeichnet!":prozentzahl>=60?"Gut! Noch etwas üben.":"Nochmal die Übersicht ansehen!"}</div>
        </div>

        {/* Fragen-Review */}
        <div style={{textAlign:"left",marginBottom:24}}>
          <h3 style={{fontSize:15,margin:"0 0 12px",color:"#c8b090"}}>Alle Fragen im Überblick:</h3>
          {quizFragen.map((frage,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:8}}>
              <div style={{fontSize:11,color:C.sub,marginBottom:4}}>Frage {i+1}</div>
              <div style={{fontSize:13,marginBottom:6}}>{frage.f}</div>
              <div style={{fontSize:12,color:"#2ecc71"}}>✓ Richtig: {frage.a[frage.r]}</div>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          <button style={{...s.btn("#1e3a5f"),fontSize:13,padding:"10px 22px"}} onClick={()=>setSeite("quiz_setup")}>⚙️ Neues Quiz</button>
          <button style={{...s.btn("#1e4a2a"),fontSize:13,padding:"10px 22px"}} onClick={()=>starteQuiz(quizKat,quizAnzahl)}>🔄 Nochmal</button>
          <button style={{...s.btn("#333"),fontSize:13,padding:"10px 22px"}} onClick={()=>{setSeite("uebersicht");setAktivesThema(null);}}>📚 Übersicht</button>
        </div>
      </div>
    </div>
  );

  return <div style={s.page}><NavBar/><div style={s.wrap}><p style={{color:C.sub}}>Lade...</p></div></div>;
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
