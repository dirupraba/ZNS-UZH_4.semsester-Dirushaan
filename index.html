const THEMEN = [{"id": "motorik", "titel": "Motorik", "emoji": "🏃", "farbe": "#e74c3c", "block": "ZNS", "sektionen": [{"titel": "Motorische Kortexareale", "punkte": ["Primärer Motorkortex M1 (Area 4): Gyrus praecentralis; niedrigste Reizschwelle; somatotopisch = motorischer Homunkulus (Schicht V: Betz-Riesenzellen als direkteste Pyramidenbahn-Neurone)", "Supplementär-motorischer Kortex SMA (medial, Area 6): erstellt Bewegungsprogramm; bimanuale Koordination; Reizschwelle höher als M1; Eingang v.a. Basalganglien; Bereitschaftspotential schon 800ms vor Willkürbewegung!", "Prämotorischer Kortex PM (lateral, Area 6): initiiert Bewegungsphase; Arm-/Handorientierung; Körperhaltung; Reizschwelle zwischen SMA und M1; Eingang v.a. Zerebellum", "Broca-Areal (Area 44/45, Gyrus frontalis inferior): motorisches Sprachfeld; dominant links; bei Läsion motorische Aphasie (nicht-flüssige Sprache!)", "Frontales Augenfeld FEF (Area 8): Sakkadengenerierung; Eingang visueller Kortex; Efferenzen zu PPRF und Colliculus superior", "Posterior-parietaler Kortex: sensorischer Assoziationskortex; verarbeitet komplexe sensorische Info für Bewegungsplanung; Läsion → Apraxie (ideomotorisch) oder visueller Neglect", "Reizschwellen-Hierarchie: M1 < PM < SMA (von niedrigster zu höchster); in ALLEN motorischen Arealen lassen sich durch Reizung Bewegungen auslösen", "Efferenzkopie: Abzug des Motorkommandos wird an Kleinhirn gesendet → Vergleich mit sensorischer Rückmeldung (Reafferenz) → Korrektur möglich"]}, {"titel": "Pyramidenbahn & absteigende Bahnen", "punkte": ["Pyramidenbahn = Tractus corticospinalis: ~80% kreuzen in Decussatio pyramidum (Medulla oblongata) → Tractus corticospinalis lateralis (Seitenstrang = laterales System); ~20% ipsilateral → Tractus corticospinalis anterior (Vorderstrang, kreuzen segmental)", "Fibrae corticonucleares (kortikobulbäre Fasern): zu Hirnnervenmotorikkernen III–XII; meist kontralateral; AUSNAHME: Stirnast N.VII + obere Anteile N.XII + N. XI erhält BILATERALE Innervation (zentrale Fazialisparese: Stirn bleibt!)", "Laterales motorisches System: Tractus corticospinalis lat. + Tractus rubrospinalis (Ncl. ruber → kreuzt → RüMa) → laterale Vorderhornzellen → distale Extremitäten, Feinmotorik, Flexoren", "Mediales (ventromediales) motorisches System: Tractus vestibulospinalis + Tractus reticulospinalis medialis + Tractus tectospinalis → mediale Vorderhornzellen → Rumpf, Stand, Extensoren, Haltungsmotorik; meist bilateral", "Tractus vestibulospinalis lateralis (Ncl. Deiters): aktiviert Extensoren, Schutzreflexe; Tractus vestibulospinalis medialis: Nackenmuskulatur", "Tractus reticulospinalis medialis (pontine FR): aktiviert Extensoren; Tractus reticulospinalis lateralis (medulläre FR): hemmt Extensoren, fazilitiert Flexoren", "Tractus tectospinalis (Colliculus superior → kreuzt): Kopf-Augen-Koordination, visuelle Reflexe", "Dezerebrierungsstarre: Läsion auf Höhe Vierhügelplatte → hemmende kortikoretikuläre Bahn auf FR fällt weg → übersteigerte Extensoren-Aktivierung über Tractus vestibulospinalis + exzitierende FR", "Oberes MN (supraspinal): Spastik, Hyperreflexie, Babinski+, Kloni, KEIN Muskelschwund, Massensynergien", "Unteres MN (spinal/peripher): schlaffe Lähmung, Muskelatrophie, Faszikulationen, Areflexie"]}, {"titel": "Muskelrezeptoren & Reflexe", "punkte": ["Muskelspindel: parallel zur extrafusalen Muskulatur; 3-10 intrafusale Fasern; Ia-Fasern (annulospiral) = Muskellänge + Dehnungsgeschwindigkeit; II-Fasern (Blumenspray) = nur Länge", "γ-Motoneurone: innervieren polare Spindelenden → kontrahieren polare Anteile → spannen äquatorialen Teil → Sensitivität↑; α-γ-Koaktivierung verhindert Spindelpause bei Willkürkontraktion!", "Golgi-Sehnenorgan: IN SERIE zur Muskulatur (Sehne); Ib-Fasern; misst Muskelspannung (Kraft); bei Überlastung: Ib → hemmende Interneurone → α-MN gehemmt (negative Feedback, verhindert Muskelruptur)", "Monosynaptischer Eigenreflex (Dehnungsreflex): Ia → direkt auf α-MN desselben Muskels + reziproke Hemmung Antagonist (via Ia-Interneuron, Glycin); klinisch: PSR, BSR, TSR etc.", "Polysynaptischer Fremdreflex: Haut-Nozizeptoren → Interneuronenkette → Flexorreflex ipsilateral + gekreuzter Extensorreflex kontralateral (wichtig: Babinski = pathologisch bei Erwachsenen!)", "Renshaw-Zellen (rekurrente Hemmung): Axonkollaterale α-MN (cholinerg) → Renshaw (glycinerg) → hemmt α-MN zurück + hemmt Ia-Interneurone → dämpft überschießende Kontraktion; Strychnin blockiert → Tetanus-ähnlich", "α-MN-Pool somatotopisch: medial = proximal/Rumpf; lateral = distale Extremitäten; ventral = Extensoren; dorsal = Flexoren", "Motorische Einheiten: Typ I (S, slow-twitch, ermüdungsresistent, oxidativ); Typ IIa (FR, fast-resistant); Typ IIb (FF, schnell ermüdend, glykolytisch); Sprouting nach MN-Verlust → fibre-type grouping (histolog. Zeichen!)"]}, {"titel": "Haltungsmotorik & Lokomotion", "punkte": ["Central Pattern Generator (CPG): spinale Rhythmusgeneratoren; können alternierend Flexoren/Extensoren aktivieren ohne supraspinale Führung; bei Katzen nach Dezerebrierung auf Laufband aktiv", "Posturale Reflexe (long-loop, long-latency): supraspinale Schaltkreise einbezogen inkl. Motorkortex; antizipatorisch (Vorbereitung vor Störung) + reaktiv (Gegenreaktion)", "Labyrinthreflexe (statisch): absolute Kopflage im Raum → Vestibularapparat → Muskeltonusanpassung", "Halsreflexe (tonic neck reflex): Kopf relativ zu Rumpf → Hals-Propriozeption → Tonusanpassung", "Vestibulospinale Reflexe: Extensoren-Aktivierung für Stand; Ncl. Deiters = direkte Verbindung zum RüMa; Vestibulozerebellum hemmt Ncl. Deiters physiologisch", "MLR (Mesencephale Lokomotionsregion) + MRF (Mesencephale Retikulärformation): Hirnstammkontrolle der Gangbewegung"]}, {"titel": "Motorische Störungen & Klinik", "punkte": ["Hemiplegie: komplette Lähmung einer Körperseite; Wernicke-Mann-Gangbild: extendiertes spastisches Bein, flektierter Arm, Zirkumduktion; Pusher-Syndrom nach kontralateralem Kortexinfarkt", "Babinski-Reflex: Plantarreflexextension bei Erwachsenen = Pyramidenbahnläsion (normal bei Säuglingen bis 18 Monate!); Klonus = rhythmische Dehnreflexe = Pyramidenbahnläsion", "Brown-Séquard: halbseitige RüMa-Läsion → ipsilateral: Motorik + Tiefensensibilität (Hinterstrang); kontralateral: Schmerz + Temperatur (Tractus spinothalamicus)", "Spastik vs. Rigor: Spastik = geschwindigkeitsabhängig (Clasp-knife), oberes MN; Rigor = gleichmäßig ('Bleiröhren'), Basalganglien; Hypotonie = Kleinhirn", "ALS: 1.+2. MN degenerieren gleichzeitig → Spastik + Hyperreflexie + Atrophie + Faszikulationen; keine sensorischen Ausfälle; Bulbärsyndrom; Riluzol (NMDA-Antagonist, moderat wirksam)", "Hemisphärenunterschied Motorik: kontralaterale Innervation der Extremitäten; ipsilaterale Rumpfinnervation (bilaterales System); deshalb bei einseitiger Kortexläsion Rumpfstabilität oft erhalten"]}]}, {"id": "zerebellum", "titel": "Zerebellum", "emoji": "🧠", "farbe": "#8e44ad", "block": "ZNS", "sektionen": [{"titel": "Anatomie & funktionelle Gliederung", "punkte": ["3 Lappen: Lobus anterior (vor Fissura prima), Lobus posterior (größter), Lobus flocculonodularis (Nodulus + Flocculus, evolutionär ältester Teil = Archicerebellum)", "Kleinhirnkerne lateral→medial: Ncl. dentatus (gezahnt, größter, Hilum!); Ncl. emboliformis + Ncl. globosus = Ncl. interpositus; Ncl. fastigii (Dachkern, IV. Ventrikel)", "Vestibulozerebellum (Archicerebellum = Lobus flocculonodularis): Vestibuläre Afferenzen; Projektion → Ncl. vestibularis lateralis (Deiters); Gleichgewicht + VOR; Läsion: Pendelnystagmus, Schwindel, Erbrechen", "Spinozerebellum Vermis (Paleocerebellum): Afferenzen aus RüMa (Propriozeption, Somatosensorik); Projektion → Ncl. fastigii → Vestibularkerne + FR (via Tractus vestibulospinalis + reticulospinalis); Haltung + Lokomotion", "Spinozerebellum Intermediäre Hemisphäre: Afferenzen RüMa (distale Extremitäten); Projektion → Ncl. interpositus → Ncl. ruber (rubrospinal) + Thalamus VL → M1 (Kortikospinal); Extremitätenmotorik + Feinmotorik", "Pontozerebellum/Zerebrozerebellum (Neocerebellum = laterale Hemisphäre): Afferenzen: Kortex → Ncll. pontis → Ped. cer. medius; Projektion → Ncl. dentatus → Thalamus VL → M1/PM/SMA + Ncl. ruber; Bewegungsplanung, Feinmotorik", "3 Kleinhirnstiele: Ped. cer. inferior (Afferenzen: Tractus spinocerebellaris post., Tractus olivocerebellaris; Efferenzen: Ncl. fastigii → Vestibularkerne); Ped. cer. medius (NUR Afferenzen aus Ncll. pontis!); Ped. cer. superior (v.a. Efferenzen: Ncl. dentatus + interpositus → Thalamus/Ncl. ruber)", "Guillain-Mollaret-Dreieck: Ncl. dentatus ↔ Tractus tegmentalis centralis ↔ Ncl. olivaris inferior; Ncl. ruber beteiligt; hypertrophe Olivendegeneration bei Läsion → rhythmischer Gaumensegeltremor"]}, {"titel": "Histologie & Schaltkreise", "punkte": ["3 Kortexschichten (außen→innen): Stratum moleculare (zellkörperarm: Parallelfasern, Dendriten der PZ, Korb-/Sternzellen) → Stratum ganglionare (Purkinje-Zellen-Somata) → Stratum granulosum (Körnerzellen dichtgepackt, Golgi-Zellen, Glomeruli)", "Purkinje-Zellen (PZ): GABAerg; EINZIGER Ausgang des Kleinhirnkortex → projizieren auf Kleinhirnkerne + Ncl. vestibularis lateralis; 2D-Dendritenbaum (sagittal); ~100.000-200.000 Dornfortsätze; einfache Aktionspotentiale (simple spikes)", "Körnerzellen: zahlreichste Neurone im gesamten ZNS; glutamaterg; nur 3-4 Dendriten; T-förmige Axone → Parallelfasern (horizontal in Stratum moleculare, orthogonal zum PZ-Baum); 1 PF kontaktiert ~450 PZ; 1 PZ erhält ~200.000 PF", "Kleinhirn-Glomerulus: synaptischer Komplex im Stratum granulosum; Zentrum: Moosfaser-Bouton; umgeben von Körnerzell-Dendriten + Golgi-Zell-Dendriten/-Axonen", "Korbzellen (GABAerg): nahe PZ-Somata; bilden korbartige hemmende Axonendgeflechte um PZ-Somata; lateral zur Parallelfaserrichtung → laterale Hemmung → Kontrastverstärkung", "Sternzellen (GABAerg): im Stratum moleculare; hemmen PZ-Dendriten; mehrere PZ durch ein Axon erfasst", "Golgi-Zellen (GABAerg): im Stratum granulosum; Dendriten in Molekularschicht; Axone im Glomerulus → negative Rückkopplung auf Körnerzellen (Feed-Forward-Inhibition)", "Moosfasereingang: Haupteingang; aus Ncll. pontis (EINZIGER Eingang über Ped. cer. medius!), Vestibularkernen, RüMa, Formatio reticularis; → Körnerzellen → Parallelfasern → PZ (simple spikes); auch direkt auf Kleinhirnkerne", "Kletterfasereingang: NUR aus Ncl. olivaris inferior (Tractus olivocerebellaris → Ped. cer. inferior); DIREKT auf PZ-Dendriten; 1 Kletterfaser : 7-10 PZ; 1 PZ : 1 Kletterfaser; massive Erregung → komplexe Aktionspotentiale (complex spikes) mit Ca2+-APs", "LTD (Langzeit-Depression): gleichzeitige PF- und KF-Aktivierung → mGluR1 (Gq) → IP3 + DAG → PKC → AMPA-Rezeptor-Endozytose → EPSP↓ → PZ-Hemmung↓ → Kleinhirnkerne disinhibiert → motorisches Lernen"]}, {"titel": "Kleinhirnfunktionen & Läsionen", "punkte": ["Komparator: Efferenzkopie (Moosfasern aus Ncll. pontis ← kortikospinale Kollateralen) vs. Reafferenz (sensorisches Feedback RüMa); Fehler codiert durch Kletterfasereingang (untere Olive)", "Klassische Konditionierung Lidschlussreflex: CS (Ton) → Moosfasern → PZ + Ncl. interpositus; US (Luftstoss) → Kletterfasern; gleichzeitig → LTD → PZ-Hemmung ↓ → Ncl. interpositus disinhibiert → conditioned response", "Dysmetrie: fehlerhafte Zielbewegung (Hypermetrie = zu weit, Hypometrie = zu kurz); Antagonist bremst zu spät; Finger-Nase-Test, Ferse-Knie-Test", "Intentionstremor: Zittern bei Zielbewegung, verstärkt wenn Ziel näher kommt; DD: Ruhetremor (Parkinson); Klinisch: Finger-Nase-Test", "Dysdiadochokinese: gestörte rasche Wechselbewegungen (Pro-/Supination, Klopfen); Test: Pat. soll rasch Pro-/Supination machen", "Gangataxie (Vermisläsion): breitbeiniger Taumelgang; Standunsicherheit; Romberg-Test: beim Kleinhirn positiv auch bei offenen Augen!", "Extremitätenataxie (Hemisphärenläsion): ipsilateral! Dysmetrie der Extremitäten", "Blickataxie/Nystagmus (Flocculonodularis-Läsion): Sakkadendysmetrie; Pendelnystagmus; Schwindel + Übelkeit", "Hypotonie: herabgesetzter Muskeltonus (Kleinhirn hemmt normalerweise Extensorentonus via Ncl. fastigii nicht); Pendelnystagmus ohne Fixation", "Ursachen Kleinhirnläsion: Medulloblastom (Kinder, Vermis), Hämangioblastom, PICA-Infarkt (→ Wallenberg-Syndrom!), Alkohol (Purkinjezelldegeneration), MS, hereditäre Ataxien (Friedreich, SCA)"]}]}, {"id": "basalganglien", "titel": "Basalganglien", "emoji": "⚙️", "farbe": "#2980b9", "block": "ZNS", "sektionen": [{"titel": "Anatomie & Entwicklung", "punkte": ["Striatum = Ncl. caudatus + Putamen + Ncl. accumbens (ventrales Striatum); Ncl. caudatus + Putamen durch Capsula interna getrennt aber graue Brücken (Streifenkörper = Corpus striatum)", "Ncl. lentiformis = Putamen + Globus pallidus (GPe + GPi); GPe = externus (lateral); GPi = internus (medial)", "Entwicklung: Striatum + Ncl. accumbens → Telencephalon; Globus pallidus + STN + SNr + Zona reticularis → Diencephalon; SNc → Mesencephalon", "Ncl. subthalamicus (STN): EINZIGE glutamaterge (exzitatorische) Struktur innerhalb der Basalganglien-Schaltkreise (alle anderen Kerne GABAerg!); Hyperdirekter Weg: Kortex → STN direkt (schnellste Bahn = Stop-Signal)", "Substantia nigra pars compacta (SNc): dopaminerg; Neuromelanin (Abbauprodukt Dopamin → schwarz); mesostriatales System → D1+D2 auf Striatum-MSN", "ALLE Projektionsneurone der Basalganglien GABAERG (inhibitorisch) → Grundprinzip: tonische Inhibition des Thalamus; Bewegung durch Disinhibition", "Medium Spiny Neurons (MSN): ~95% der Striatumneurone; GABAerg; viele Dornfortsätze; D1 oder D2; integrieren kortikalen (glutamaterg) + dopaminergen Input der SNc"]}, {"titel": "Schaltkreise & Transmitter", "punkte": ["DIREKTER WEG (D1-MSN, Enkephalin –): Kortex → Striatum (D1) → GPi/SNr (HEMMUNG) → Thalamus VA/VL DISINHIBIERT → motorische Kortex → MEHR Bewegung; Dopamin D1 → cAMP↑ → AKTIVIERT D1-MSN", "INDIREKTER WEG (D2-MSN, Dynorphin –): Kortex → Striatum (D2) → GPe (gehemmt) → STN enthemmt → GPi/SNr AKTIVIERT → Thalamus stark GEHEMMT → WENIGER Bewegung; Dopamin D2 → cAMP↓ → HEMMT D2-MSN (D2-Hemmung = Enthemmung des direkten Wegs!)", "HYPERDIREKTER WEG: Kortex → STN direkt (schnellste Verbindung!) → GPi/SNr aktiviert → Thalamus gehemmt; Stop-Signal vor der Bewegung", "Dopamin D1 auf D1-MSN: aktivierend (cAMP↑, PKA↑, DARPP-32); direkter Weg verstärkt → mehr Bewegung", "Dopamin D2 auf D2-MSN: hemmend (cAMP↓); indirekter Weg gehemmt → auch mehr Bewegung (beide wirken in gleiche Richtung für willkürliche Bewegungen!)", "PARKINSON (DA-Mangel): D1-MSN unteraktiv (kein D1-Boost), D2-MSN überaktiv (kein D2-Hemmung) → indirekter Weg↑ → GPi/SNr↑ → Thalamus stark gehemmt → AKINESE/BRADYKINESE + RIGOR + RUHETREMOR", "HUNTINGTON FRÜH: D2-MSN degenerieren zuerst → indirekter Weg↓ → GPe enthemmt → STN gehemmt → GPi/SNr↓ → Thalamus disinhibiert → CHOREA (Hyperkinese, überschießende Bewegungen)", "HUNTINGTON SPÄT: auch D1-MSN (direkter Weg) degenerieren → AKINESE + RIGOR", "Ncl. accumbens (limbisches Striatum): ventral; Dopamin aus VTA (= Area tegmentalis ventralis); Belohnung/Motivation; Sucht (chronisch: DA-Freisetzung↑ bei Drogenkonsum); Anhedonie bei DA-Mangel"]}, {"titel": "Schleifen & Erkrankungen", "punkte": ["Motor-Schleife: PM/SMA → Putamen → GPi/SNr → Thalamus VL/VA → M1/PM/SMA; ~2/3 GPi-Efferenzen", "Okulomotorik-Schleife: FEF → Ncl. caudatus → GPi/SNr → Thalamus → FEF; SNr-Efferenzen → Colliculus superior", "Präfrontale (kognitive) Schleife: DLPFC → Ncl. caudatus → GPi/SNr → Thalamus MD/VA → PFC; Planung, Kognition, Verhaltensflexibilität; ~1/3 GPi-Efferenzen", "Limbische Schleife: Limbischer Kortex + Hippocampus + Amygdala → Ncl. accumbens → ventrales Pallidum → Thalamus MD → Limbischer Kortex; Motivation", "Parkinson: sporadisch (80%); familiär: SNCA (α-Synuclein), LRRK2, Parkin (juvenil), PINK1; Lewy Bodies = α-Synuclein-Aggregate in SNc-Neuronen; Verlust >50-60% SNc-Neurone = Symptome sichtbar", "Parkinson nicht nur motorisch: Anosmie oft FRÜHSYMPTOM (Braak-Stadium 1-2!); REM-Schlafstörung (Ausleben Träume!); Obstipation; autonome Dysfunktion (orthostatische Hypotonie); Depression; Kognitionsabbau", "Parkinson Therapie: L-Dopa + Carbidopa (= Decarboxylasehemmer, verhindert periphere Umwandlung); Dopaminagonisten (Pramipexol); MAO-B-Hemmer (Selegilin); Tiefe Hirnstimulation STN; keine Kausaltherapie!", "Huntington: Chromosom 4p; CAG-Repeat im Huntingtin-Gen (>35 = pathologisch, >40 = volle Penetranz, >70 = juvenil); Antizipation (paternale Vererbung häufiger länger); Huntingtin = Funktion in Autophagie + Vesikelverkehr", "Tiefe Hirnstimulation (DBS): hochfrequente Stimulation STN (Parkinson) oder GPi; wirkt ähnlich wie Läsion; reversibel + einstellbar; Wirkungsmechanismus noch nicht vollständig geklärt"]}]}, {"id": "thalamus", "titel": "Thalamus & Schlaf", "emoji": "🔀", "farbe": "#27ae60", "block": "ZNS", "sektionen": [{"titel": "Thalamus-Anatomie & Kerngruppen", "punkte": ["Thalamus = Größter Teil des Diencephalon; schaltet ALLE Sinne (AUSSER Geruch!) zum Kortex; 'Tor zum Bewusstsein'; ~120 Kerne; paarige Ei-Struktur; Lamina medullaris interna trennt Kerngruppen", "Ncl. reticularis thalami: GABAerg; kappenartig lateral dem Thalamus aufsitzend; hemmt ALLE anderen Thalamuskerne (Aufmerksamkeitsfilter, Selektion); erhält Afferenzen von Kortex + Thalamuskerne", "Intralaminäre Kerne (Ncl. centromedianus u.a.): ARAS (Aufsteigendes Aktivierendes Retikuläres System); unspezifische Projektion → Striatum + weite Kortexareale; Steuerung Bewusstsein + Aufmerksamkeit", "Motorische Kerne VL (Ventrolateral) + VA (Ventralanterior): Afferenzen Kleinhirn (VL) + Basalganglien (VA); Efferenzen → M1/PM/SMA; VPLo: Kleinhirn; VA: GPi/SNr", "Somatosensorische Kerne VPL (Ventralposteroalateral): Rumpf/Extremitäten; Afferenzen: Hinterstrangkerne + Tractus spinothalamicus; Projektion → S1", "VPM (Ventralposteromedial): Gesicht; Afferenzen: Ncl. principalis trigemini; + Ncl. tractus solitarii (Geschmack) → S1 + Insula", "CGL (Corpus geniculatum laterale) = Metathalamus: 6 Schichten; Schicht 1+2 o Zapfen; Außenglied = photoempfindlich (Membranscheiben/Disci mit Sehpigment); Innenglied = Energieversorgung (viele Mitochondrien) + Sehpigment-Synthese", "2. Neuron = Bipolare Zellen (KEINE APs!); ON-Bipolarzellen (weniger Glutamat → Depolarisation via mGluR6/GPCR → mehr Glutamat freigeben) und OFF-Bipolarzellen (weniger Glutamat → Hyperpolarisation via ionotrope Glutamatrezeptoren)", "3. Neuron = Multipolare Ganglienzellen: ERSTE Zellen die APs generieren!; sammeln auf Innenseite der Pars optica; Axone → N. opticus; 50% = Fovea!", "Stäbchen: 500 nm Absorptionsmax. (grün-blau); extrem lichtempfindlich (~100x sensitiver als Zapfen); skotopisches Sehen; intrazelluläre Disci (geschlossen); 1 Photon genug!", "Zapfen: S-Zapfen (420 nm, Blau-violett); M-Zapfen (535 nm, Grün); L-Zapfen (567 nm, Orangerot); Einfaltungen der Plasmamembran (offen); benötigen mehr Photonen; in Fovea dominierend", "Fovea centralis: 50 Zapfen/100μm (höchste Dichte!); KEINE Stäbchen; KEINE Gefässe (zur Seite geschoben); KEINE Ganglienzellen-Kerne im Zentrum (verschoben); 1:1-Verschaltung Zapfen→Bipolar→Ganglienzelle; Ort des schärfsten Sehens", "Papilla nervi optici (Discus optici): blinder Fleck (keine Rezeptoren); N. opticus-Austrittsstelle; A. centralis retinae = Endarterie (Verschluss → Erblindung!); temporal 15° von Fovea", "Pigmentepithel: Phagozytose alter Disci (Turnover 10 Tage!); Abblendung (Melanin = dunkle Kammer); Ernährung Schicht 1-5 (via Choroidea!); Blut-Retina-Schranke (Tight Junctions); Isomerisierung von all-trans Retinal zu 11-cis Retinal", "Rhodopsin: 11-cis Retinal + Opsin (GPCR, 7 TMD); Lichtabsorption → 11-cis → all-trans Retinal → Metarhodopsin II (R*) → Transducin (Gα) → Phosphodiesterase → cGMP↓ → CNG-Na-Kanal SCHLIESST → Hyperpolarisation → weniger Glutamat", "Dunkelstrom: im Dunkeln OFFEN der Na-Kanal (cGMP hoch) → Depolarisation (-30mV) → MEHR Glutamat an On-Bipolarzelle; Licht = WENIGER Glutamat (also Licht hemmt!)", "Verstärkung: 1 Photon → 1 Rhodopsin → 500 Tr . ciliares longi) → Cornea-Reflex", "Sehbahn: Photorezeptoren (1. Neuron) → Bipolare Zellen (2. Neuron) → Ganglienzellen (3. Neuron) → Chiasma opticum (nasale Fasern kreuzen!) → Tractus opticus → CGL 4. Neuron → Radiatio optica → V1 (Sulcus calcarinus, Area striata/17)", "Gesichtsfeldausfälle: N. opticus-Läsion → monokulär blind (alles dieses Auges); Chiasma-Läsion (typisch: Hypophysenadenom!) → bitemporale Hemianopsie ('Scheuklappen'); Tractus opticus-Läsion → homonyme Hemianopsie kontralateral; V1-Läsion → homonyme Hemianopsie MIT Makulaaussparung (doppelte kortikale Repräsentation!)", "Lichtreaktion: Melanopsin-Ganglienzellen → N. opticus → Chiasma → BILATERAL Area pretectalis → bilateral Edinger-Westphal-Kern → N.III → Ggl. ciliare → M. sphincter pupillae; KONSENSUELLE Lichtreaktion! (Atropin blockt → Mydriasis)", "Swinging-Flashlight-Test: Bei RAPD (relativer afferenter Pupillendefekt) = Marcus Gunn-Pupille: Licht auf krankes Auge → beide Pupillen erweitern sich (weniger Afferenz); typisch für MS-Optikusneuritis!", "CGL: 6 Schichten monookulär (Schicht 1+4+6 = kontralateral nasale Retina; 2+3+5 = ipsilateral temporale Retina); 1+2 = Magno-Zellen (Bewegung, Kontrast, keine Farbe); 3-6 = Parvo-Zellen (Farbe + Detail); Konio zwischen Schichten (Blau-Gelb via K-Zellen)", "V1 (primärer Sehkortex): retinotopisch; Kortikale Magnifikation der Fovea; Simple Cells (Orientierungsselektiv, längliche rezeptive Felder); Complex Cells (Orientierungs- + Richtungsselektiv); Orientierungssäulen (Pinwheel); Okuläre Dominanzsäulen (alternierend)", "Dorsaler (Where?/Wo?) Pfad: V1 → V2 → MT/V5 → parietaler Kortex; Bewegung, Tiefenwahrnehmung, Navigation; Läsion → visueller Neglect, Balint-Syndrom", "Ventraler (What?/Was?) Pfad: V1 → V2 → V4 → inferotemporaler Kortex (IT); Form, Farbe, Objekterkennung; Gesichter (FFA = Fusiform Face Area); Läsion → visuelle Agnosie, Prosopagnosie"]}]}, {"id": "augenentwicklung", "titel": "Augenentwicklung & Okulomotorik", "emoji": "🔬", "farbe": "#27ae60", "block": "Sinnesorgane", "sektionen": [{"titel": "Augenentwicklung", "punkte": ["Prosencephalon → Diencephalon → bilaterale Augenbläschen (laterale Ausstülpungen) → Augenbecher (inneres Blatt: neurale Retina; äußeres Blatt: Pigmentepithel)", "Augenbecherstiel → wird zu N. opticus (Axone multipolarer Ganglienzellen + Oligodendrozyten füllen das Lumen)", "Linsenplakode: Oberflächenektoderm, durch Augenbläschen-Induktion verdickt → eingesenkt → Linsenbläschen → Linse (hintere Zellen = primäre Linsenfasern; vordere Zellen = bleiben als Epithelium lentis)", "Reziproke Induktion: Augenbläschen→Linsenplakode; Linsenplakode→Augenbecher→Retina; Linse→Cornea-Entwicklung; 'Wenn das eine fehlt, entwickelt sich das andere nicht'", "Pax6: 'Augen-Mastergen'; Homöobox-Transkriptionsfaktor; heterozygote Mutation → Mikrophthalmie/Aniridie; homozygote Mutation → Anophthalmie; ektopische Expression (Bein Drosophila) → Auge an atypischen Orten!", "Sonic Hedgehog (Shh): bilaterale Augentrennung; Mutation → Zyklopie + Holoprosenzephalie (keine Hemisphären-Trennung); Shh aus Vorderdarmendoderm + Floorplate", "Neuralleistenmesenchym: bildet Cornea (Substantia propria + Epithelium posterius), Sclera, Choroidea, Ziliarkörper; Cornea-Epithelium anterius = Ektoderm!; Sclera ≡ Dura mater; Choroidea ≡ Pia mater", "Augenbecherspalt: Verschluss in 7. Woche; A. hyaloidea verläuft darin (Linsenversorgung); nach Verschluss → A. centralis retinae; Kolobom = Verschlussstörung → Iriskolobom", "Persistierende Iridopupillarmembran: Gefäßnetz vor Linse nicht vollständig zurückgebildet → weiße Stränge über Pupille (meist harmlos)"]}, {"titel": "Okulomotorik & Augenbewegungen", "punkte": ["6 extraokuläre Muskeln: M. rectus sup/inf/med/lat + M. obliquus sup/inf; 3 Freiheitsgrade: Adduktion/Abduktion + Elevation/Depression + Intorsion/Extorsion", "N.III (N. oculomotorius): M. rectus sup/med/inf + M. obliquus inf; alle auf IPSILATERALE Seite; bei kompletter N.III-Läsion: Ptosis + Mydriasis + Auge 'unten-außen'", "N.IV (N. trochlearis): M. obliquus superior; DORSAL; ALLE Fasern KREUZEN (innerviert kontralateral!); bei Läsion: Doppelbilder beim Blick UNTEN+INNEN (Treppensteigen!); Kompensation: Kopfneigung Gegenseite", "N.VI (N. abducens): M. rectus lateralis; IPSILATERAL; bei Läsion: Einwärtsschielen (Konvergenzstellung); langer intrakranieller Weg → Falschlokalisation bei Hirndruck!", "Sakkaden: schnell, ballistisch, 300-700°/sec; PPRF (paramediane pontine FR) = horizontales Sehzentrum für horizontale Sakkaden; riMLF (Ncl. interstitialis Cajal) = vertikales; Omnipause-Neurone (Ncl. raphe interpositus, Glycin) = hemmen Burst-Neurone kontinuierlich → Release → Sakkade; FEF (Area 8) + Colliculus superior → steuern PPRF", "PPRF-Schaltung (horizontal): Burst-Neurone PPRF → Ncl. abducens (M. rectus lat. ipsilat.) + Interneurone → über MLF → Ncl. oculomotorius kontralateral (M. rectus med.) → KONJUGIERTE Blickwendung", "Smooth Pursuit: langsam (<30°/sec); willkürlich; bewusst; MT/V5 → FEF → PPRF; erfordert sich bewegendes Ziel", "Vestibulookulärer Reflex (VOR): Kopfdrehung → Bogengangafferenzen → Vestibularkerne → MLF → Augenmuskelkerne → KOMPENSATORISCHE Augenbewegung entgegengesetzt; Latenz <10ms! Ausfall nur bei Hirntod!", "VOR-Kalibrierung: durch Kleinhirn (Flocculus); plastisch anpassbar; VOR-Adaptation bei Prismenbrillen", "Optokinetischer Nystagmus (OKN): visuell ausgelöst (nicht vestibulär); Smooth Pursuit (langsame Phase) + Sakkade zurück (schnelle Phase); bei bewegtem Streifenmuster; langsame Phase = Richtung der Streifenbewegung; schnelle Phase = entgegen", "INO (Internukleäre Ophthalmoplegie): MLF-Läsion zwischen Ncl.VI und Ncl.III → Adduktionsausfall bei konjugiertem Blick zur GEGENSEITE; Konvergenz ERHALTEN; Abduktionsnystagmus des anderen Auges; bei MS: oft beidseitig (WEBINO = Wall-Eyed Bilateral INO)", "Vergenz (Konvergenzbewegung): nicht-konjugiert; bilateral → Nahreaktion; Divergenz = in Ferne schauen; 25°/sec; Mesencephale Zentren (Ncl. oculomotorius zugständig)", "Nystagmus: rhythmische Augenbewegung; definiert nach SCHNELLER Phase; kalorischer Nystagmus = COWS (Cold Opposite, Warm Same); vestibulär vs. optokinetisch; Blickrichtungsnystagmus = Zerebellum/FR"]}]}, {"id": "vestibular", "titel": "Vestibular- & Hörorgan", "emoji": "👂", "farbe": "#3498db", "block": "Sinnesorgane", "sektionen": [{"titel": "Vestibularorgan", "punkte": ["Membranöses Labyrinth (Endolymphe, K+-reich wie IZR = 150 mM, Na+-arm) im knöchernen Labyrinth (Felsenbein); perilymphatischer Raum dazwischen (Perilymphe = Na+-reich wie EZR)", "Endolymphe: produziert von Stria vascularis (Cochlea) + Dark cells (Basis Crista ampullaris); Resorption via Ductus endolymphaticus (Aquaeductus vestibuli) → eventuell Subarachnoidalraum", "Maculae staticae: 2 Organe; Macula utriculi (HORIZONTAL, Linearbeschleunigung horizontal; Stehen: dauerhaft aktiv für Gravitation); Macula sacculi (VERTIKAL, Linearbeschleunigung vertikal; Stehen: misst Gravitation vertikal)", "Statolithenmembran (Membrana statoconiorum): Proteoglykane + CaCO3-Kristalle (Statolithen/Otolithen) an Oberfläche; 3x DICHTER als Endolymphe → Schwere force → Scherkräfte → mechanischer Reiz; fehlt bei Bogengängen (Cupula = gleiche Dichte!)", "Striola: imagin. Scheitelline teilt Macula in 2 Hälften; Utriculus: Haare ZEIGEN ZUR Striola (längstes Zilium richtung Striola); Sacculus: Haare ZEIGEN WEG von Striola; → dadurch: ALLE Richtungen in einer Ebene detektierbar", "3 Bogengänge (Cupulaorgane): anterior, posterior, lateral; 90° zueinander! → alle 3 Rotationsachsen abgedeckt; Cupula = Galertmasse GLEICHE Dichte wie Endolymphe → reagiert nur auf STRÖMUNG (Drehbeschleunigung), NICHT auf Gravitation", "Haarzellen Typ I (birnenförmig): kelchartiger afferenter Calyx-Dendrit; sehr schnell; diskriminativ; Typ II (zylindrisch): Bouton-Synapsen; afferent + efferent; beide: Glutamat-Haupttransmitter; Kinozilium = richtungsgebendes Zilium (9x2+2 + Basalkörper)", "Mechanoelektrische Transduktion: Tip-links verbinden Stereozilien → Auslenkung öffnet mechanosensitive Kanäle → K+-Einstrom aus Endolymphe (K+ hoch!) → Depolarisation → Ca2+-Kanal → Glutamat-Exozytose; sehr schnell (1/10ms)", "Richtungscodierung: Auslenkung ZUM Kinozilium → Depolarisation → AP-Frequenz↑; WEG vom Kinozilium → Hyperpolarisation → AP-Frequenz↓; basale AP-Frequenz in Ruhe = 50-100 AP/s", "Bogengangfunktion: Kopfdrehung → Endolymphe bleibt (Trägheit) zurück → relative Strömung → Cupula ausgelenkt → Haare ausgelenkt; nach 5-10 Sek. konstanter Rotation: Cupula zurück in Ausgangsposition → keine Rotationswahrnehmung mehr; Stopp → Gegenrotation gefühlt!", "Vestibulariskerne (4 Kerne): Afferenzen: Vestibularapparat + Kleinhirn (Ncl. fastigii, Flocculus) + Propriozeption + Auge; Efferenzen: Tractus vestibulospinalis (Stützmotorik, Extensoren) + MLF (VOR, Augenmuskelkerne) + Kleinhirn + Thalamus (Bewusstsein) + Hypothalamus (Kinetosen!)", "VOR-Schaltkreis: 3-Neuronenbogen; Bogengangafferenz → Vestibulariskern → MLF → Ncl. III/IV/VI → Augenmuskel; Latenz <10ms; robustester Hirnstammreflex", "Kalorischer Nystagmus: warme/kalte Flüssigkeit → Dichteveränderung Endolymphe → Strömung im lateralen Bogengang → Cupula-Auslenkung → VOR-Reaktion; Patientenposition: 30° Kopfhochlage (lateraler Bogengang dann vertikal!); COWS: Cold Opposite (Nystagmus zur Gegenseite), Warm Same (zur gleichen Seite)", "Kinetosen: sensorischer Mismatch vestibuläre/visuelle/propriozeptive Info; Schwindel + Übelkeit + Blässe; Hypothalamus-Einfluss; Otolithen-Asymmetrie-Hypothese; Therapie: Scopolamin (Antimuskarinerg)"]}, {"titel": "Hörorgan & Hörbahn", "punkte": ["Schallweg: Ohrmuschel (Trichter + Vertikallokalisierung) → Gehörgang (Resonator 3-4 kHz!) → Trommelfell (Membrana tympanica) → Malleus (Hammer) → Incus (Amboss) → Stapes (Steigbügel) → Fenestra vestibuli (ovales Fenster) → Perilymphe Scala vestibuli → Helicotrema → Scala tympani → Fenestra cochleae (rundes Fenster = Druckausgleich!)", "Mittelohr = Impedanzanpassung! KEINE Verstärkung!: Wechsel Luftleitung → Knochenleitung → Flüssigkeitsleitung; ohne Mittelohr ~98% Reflexion; mit Mittelohr ~40%; Druckverstärkung 22-fach (Hebel + Flächenverhältnis Trommelfell:ovales Fenster ~17:1)", "M. stapedius (N.VII): Stapediusreflex ab ~70-95 dB; schützt Innenohr vor Lärm; Kontraktion → Stapes verkippt → Leitung↓; sehr schnell (50ms!); VORHER aktiviert bei Sprechen (schützt vor eigener Stimme)", "M. tensor tympani (N.V3): spannt Trommelfell; moduliert Schallübertragung; Reflex bei lauten Geräuschen + Kauen", "Tuba auditiva: verbindet Mittelohr mit Nasopharynx; normalerweise GESCHLOSSEN; öffnet beim Schlucken/Gähnen (M. tensor veli palatini) → Druckausgleich; verstopft → 'Tauben Ohren' (Passagierflugzeug)", "Cochlea: Ductus cochlearis (Scala media, Endolymphe) liegt zwischen Scala vestibuli (perilymph., oben) und Scala tympani (perilymph., unten); begrenzt durch Reissner-Membran (oben) + Basilarmembran (unten)", "Tonotopie: hohe Frequenzen → Basis der Cochlea (Eingang); tiefe Frequenzen → Helicotrema (Spitze); Wanderwelle: maximale Amplitude frequenzabhängig an bestimmter Stelle", "Corti-Organ: auf Basilarmembran; innere Haarzellen (IHZ, 1 Reihe, birnenförmig, >90% der Afferenzen = EIGENTLICHE Hörwahrnehmung!); äussere Haarzellen (ÄHZ, 3 Reihen, zylindrisch, kontraktil = aktive Cochleamplifikation/Otoemissionen)", "ÄHZ-Kontraktion: Prestin-Motor (einzigartiges schnelles Motormolekül der ÄHZ-Plasmamembran); ÄHZ ändert Länge → verändert Spalt zwischen Membrana tectoria und Membrana reticularis → moduliert IHZ-Auslenkung; efferente Kontrolle aus Ncl. olivaris superior (OCB = olivokokleäres Bündel)", "Mechanoelektrische Transduktion IHZ: Basilarmembran-Schwingung → Stereozilien-Auslenkung → Tip-links → K+-Kanal öffnet → K+-Einstrom aus Endolymphe (hohe K+!) → Depolarisation → Ca2+-Kanal → Glutamat an erstes afferentes Neuron; schnell repolarisiert (K+ raus in Cortilymphe nach basolateral)", "Endocochleäres Potential (EP): +80 mV in Endolymphe (durch K+-Sekretion function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5)}

const C={
  bg:"#070710",card:"rgba(255,255,255,0.035)",
  border:"rgba(255,255,255,0.075)",text:"#e4ddd0",
  sub:"#888898",accent:"#6c9ef8"
};

function Tag({label,color="#6c9ef8"}){
  return <span style={{
    background:`${color}18`,border:`1px solid ${color}40`,
    color:color,borderRadius:6,padding:"2px 8px",fontSize:10,
    letterSpacing:"0.08em",fontFamily:"monospace",whiteSpace:"nowrap"
  }}>{label}</span>
}

function BtnSm({children,onClick,active=false,color="#2a3a4a"}){
  return <button onClick={onClick} style={{
    background:active?"rgba(108,158,248,0.15)":color,
    border:`1px solid ${active?"#6c9ef8":"rgba(255,255,255,0.08)"}`,
    color:active?"#6c9ef8":"#e4ddd0",borderRadius:8,
    padding:"6px 13px",fontSize:11,cursor:"pointer",
    fontFamily:"Georgia,serif",letterSpacing:"0.04em",
    transition:"all 0.15s"
  }}>{children}</button>
}

  return(
    <div style={{
      background:"rgba(0,0,0,0.7)",borderBottom:`1px solid ${C.border}`,

      justifyContent:"space-between",backdropFilter:"blur(16px)",
      position:"sticky",top:0,zIndex:300

          <Tag label={`${THEMEN.length} Themen`}/>
          <Tag label={`${punkte} Lernpunkte`} color="#2ecc71"/>
          <Tag label={`${total} Quizfragen`} color="#e74c3c"/>
          <Tag label={`ZNS + Sinnesorgane`} color="#f39c12"/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <div onClick={()=>setSeite("uebersicht")} style={{
          background:"linear-gradient(135deg,rgba(108,158,248,0.12),rgba(108,158,248,0.03))",
          border:`1px solid rgba(108,158,248,0.25)`,borderRadius:12,
          padding:"18px",cursor:"pointer",textAlign:"center"
        }}>
          <div style={{fontSize:30,marginBottom:6}}>📚</div>
          <div style={{fontSize:14,fontWeight:"bold",color:"#6c9ef8",marginBottom:3}}>Themenübersicht</div>
          <div style={{fontSize:11,color:C.sub}}>Alle Kapitel mit detaillierten Kernpunkten direkt aus den Zusammenfassungen</div>
        </div>
        <div onClick={()=>setSeite("quiz_setup")} style={{
          background:"linear-gradient(135deg,rgba(46,204,113,0.12),rgba(46,204,113,0.03))",
          border:`1px solid rgba(46,204,113,0.25)`,borderRadius:12,
          padding:"18px",cursor:"pointer",textAlign:"center"
        }}>
          <div style={{fontSize:30,marginBottom:6}}>🎯</div>
          <div style={{fontSize:14,fontWeight:"bold",color:"#2ecc71",marginBottom:3}}>Prüfungsquiz</div>
          <div style={{fontSize:11,color:C.sub}}>{total} prüfungsrelevante Fragen, konfigurierbar nach Thema und Anzahl</div>
        </div>
      </div>
      <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
        {["alle","ZNS","Sinnesorgane"].map(b=>(
          <BtnSm key={b} active={block===b} onClick={()=>setBlock(b)}>
            {b==="alle"?"🔀 Alle Blöcke":b==="ZNS"?"🧠 ZNS":"👁️ Sinnesorgane"}
          </BtnSm>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        {gef.map(t=>(
          <div key={t.id} onClick={()=>{setAktThema(t);setSeite("detail")}}
            style={{
              background:`linear-gradient(135deg,${t.farbe}12,${t.farbe}03)`,
              border:`1px solid ${t.farbe}28`,borderRadius:10,
              padding:"11px 13px",cursor:"pointer",
              display:"flex",alignItems:"center",gap:9
            }}>
            <span style={{fontSize:18}}>{t.emoji}</span>
            <div>
              <div style={{fontSize:12,fontWeight:"bold",color:t.farbe,marginBottom:1}}>{t.titel}</div>
              <div style={{fontSize:10,color:C.sub}}>{t.block} · {t.sektionen.reduce((a,s)=>a+s.punkte.length,0)} Punkte</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  )
}

function Uebersicht({setSeite,setAktThema}){
  const [block,setBlock]=useState("alle");
  const gef = block==="alle"?THEMEN:THEMEN.filter(t=>t.block===block);
  return(
    <div style={{maxWidth:900,margin:"0 auto",padding:"20px 14px"}}>
      <h2 style={{fontSize:17,marginBottom:14,color:"#c8b090"}}>📚 Themenübersicht</h2>
      <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        {["alle","ZNS","Sinnesorgane"].map(b=>(
          <BtnSm key={b} active={block===b} onClick={()=>setBlock(b)}>
            {b==="alle"?"Alle":b==="ZNS"?"🧠 ZNS":"👁️ Sinnesorgane"}
          </BtnSm>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
        {gef.map(t=>(
          <div key={t.id} onClick={()=>{setAktThema(t);setSeite("detail")}}
            style={{
              background:`linear-gradient(135deg,${t.farbe}10,${t.farbe}03)`,
              border:`1px solid ${t.farbe}25`,borderRadius:11,
              padding:"13px 15px",cursor:"pointer"
            }}>
            <div style={{fontSize:22,marginBottom:4}}>{t.emoji}</div>
            <div style={{fontSize:14,fontWeight:"bold",color:t.farbe,marginBottom:2}}>{t.titel}</div>
            <div style={{fontSize:10,color:C.sub,marginBottom:6}}>{t.block} · {t.sektionen.length} Sektionen · {t.sektionen.reduce((a,s)=>a+s.punkte.length,0)} Kernpunkte</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {t.sektionen.map((s,i)=>(
                <span key={i} style={{
                  background:`${t.farbe}15`,border:`1px solid ${t.farbe}25`,
                  color:t.farbe,borderRadius:4,padding:"2px 6px",fontSize:9
                }}>{s.titel}</span>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  )
}

function Detail({thema,setSeite}){
  const [aktSek,setAktSek]=useState(null);
  const [suche,setSuche]=useState("");
  const qAnz=ALLE_FRAGEN.filter(f=>f.k===thema.id).length;

  const gefilterteSek = thema.sektionen.filter((_,i)=>aktSek===null||aktSek===i);

  return(
    <div style={{maxWidth:920,margin:"0 auto",padding:"20px 14px"}}>
      <BtnSm onClick={()=>setSeite("uebersicht")}>← Zurück</BtnSm>
      <div style={{margin:"14px 0 4px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:28}}>{thema.emoji}</span>
        <div>
          <h2 style={{fontSize:20,color:thema.farbe,margin:0}}>{thema.titel}</h2>
          <div style={{fontSize:11,color:C.sub}}>{thema.block} · {thema.sektionen.reduce((a,s)=>a+s.punkte.length,0)} Kernpunkte</div>
        </div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <BtnSm onClick={()=>setAktSek(null)} active={aktSek===null}>Alle</BtnSm>
        {thema.sektionen.map((s,i)=>(
          <BtnSm key={i} active={aktSek===i} onClick={()=>setAktSek(aktSek===i?null:i)}>{s.titel}</BtnSm>
        ))}
      </div>
      <input
        value={suche} onChange={e=>setSuche(e.target.value)}
        placeholder="🔍 Suchen..."
        style={{
          width:"100%",padding:"8px 13px",background:"rgba(255,255,255,0.04)",
          border:`1px solid ${C.border}`,borderRadius:8,color:C.text,
          fontFamily:"Georgia,serif",fontSize:12,marginBottom:16,outline:"none"
        }}
      />
      {gefilterteSek.map((sek,si)=>{
        const pkt = suche
          ? sek.punkte.filter(p=>p.toLowerCase().includes(suche.toLowerCase()))
          : sek.punkte;
        if(pkt.length===0) return null;
        return(
          <div key={si} style={{marginBottom:20}}>
            <div style={{
              fontSize:12,fontWeight:"bold",color:thema.farbe,
              marginBottom:10,paddingBottom:6,
              borderBottom:`1px solid ${thema.farbe}22`
            }}>{sek.titel} <span style={{color:C.sub,fontWeight:"normal"}}>({pkt.length} Punkte)</span></div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {pkt.map((p,pi)=>{
                const q = p.toLowerCase();
                let disp = p;
                if(suche && q.includes(suche.toLowerCase())){
                  const idx = q.indexOf(suche.toLowerCase());
                  disp = <>{p.slice(0,idx)}<mark style={{background:`${thema.farbe}35`,color:thema.farbe,borderRadius:2}}>{p.slice(idx,idx+suche.length)}</mark>{p.slice(idx+suche.length)}</>;
                }
                return(
                  <div key={pi} style={{
                    background:C.card,border:`1px solid ${C.border}`,
                    borderRadius:8,padding:"9px 13px",
                    display:"flex",gap:10,alignItems:"flex-start",
                    borderLeft:`3px solid ${thema.farbe}40`
                  }}>
                    <span style={{color:thema.farbe,minWidth:22,fontSize:10,fontWeight:"bold",paddingTop:3,opacity:0.7}}>{String(pi+1).padStart(2,"0")}</span>
                    <span style={{fontSize:12,lineHeight:"1.7",color:"#d0c6b6"}}>{disp}</span>
                  </div>
                )
              }}
            </div>
          </div>
        )
      }}
      <div style={{
        marginTop:18,padding:"14px 16px",
        background:"rgba(46,204,113,0.05)",
        border:`1px solid rgba(46,204,113,0.2)`,
        borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"
      }}>
        <span style={{fontSize:12,color:"#2ecc71"}}>🎯 {qAnz} Quizfragen zu diesem Thema</span>
        <BtnSm color="#1a3a22" onClick={()=>{
          window._quizKat = thema.id;
          window._quizAnz = qAnz;
          setSeite("quiz_direct");
        }}>Quiz starten →</BtnSm>
      </div>
    </div>
  )
}

function QuizSetup({setSeite}){
  const [kat,setKat]=useState("alle");
  const [anz,setAnz]=useState(20);
  
  const getPool=(k)=>{
    if(k==="alle") return ALLE_FRAGEN;
    if(k==="ZNS") return ALLE_FRAGEN.filter(f=>THEMEN.find(t=>t.id===f.k)?.block==="ZNS");
    if(k==="Sinnesorgane") return ALLE_FRAGEN.filter(f=>THEMEN.find(t=>t.id===f.k)?.block==="Sinnesorgane");
    return ALLE_FRAGEN.filter(f=>f.k===k);
  };
  const pool=getPool(kat);
  const maxAnz=pool.length;

  return(
    <div style={{maxWidth:860,margin:"0 auto",padding:"20px 14px"}}>
      <h2 style={{fontSize:17,marginBottom:18,color:"#c8b090"}}>🎯 Quiz konfigurieren</h2>
      <div style={{
        background:C.card,border:`1px solid ${C.border}`,
        borderRadius:12,padding:"16px",marginBottom:12
      }}>
        <div style={{fontSize:11,color:C.sub,marginBottom:9,letterSpacing:"0.08em",textTransform:"uppercase"}}>Kategorie wählen</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {[
            {id:"alle",label:`🔀 Alle (${ALLE_FRAGEN.length})`},
            {id:"ZNS",label:`🧠 ZNS (${ALLE_FRAGEN.filter(f=>THEMEN.find(t=>t.id===f.k)?.block==="ZNS").length})`},
            {id:"Sinnesorgane",label:`👁️ Sinnesorgane (${ALLE_FRAGEN.filter(f=>THEMEN.find(t=>t.id===f.k)?.block==="Sinnesorgane").length})`},
            ...THEMEN.map(t=>({id:t.id,label:`${t.emoji} ${t.titel} (${ALLE_FRAGEN.filter(f=>f.k===t.id).length})`}))
          ].map(opt=>(
            <BtnSm key={opt.id} active={kat===opt.id} onClick={()=>{setKat(opt.id);setAnz(Math.min(anz,getPool(opt.id).length));}}>
              {opt.label}
            </BtnSm>
          ))}
        </div>
      </div>
      <div style={{
        background:C.card,border:`1px solid ${C.border}`,
        borderRadius:12,padding:"16px",marginBottom:18
      }}>
        <div style={{fontSize:11,color:C.sub,marginBottom:9,letterSpacing:"0.08em",textTransform:"uppercase"}}>Anzahl Fragen (max. {maxAnz})</div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          {[10,15,20,25,30,40,"Alle"].map(n=>{
            const val=n==="Alle"?maxAnz:Math.min(n,maxAnz);
            return <BtnSm key={n} active={anz===val} onClick={()=>setAnz(val)}>{n==="Alle"?`Alle (${maxAnz})`:n}</BtnSm>;
          })}
        </div>
      </div>
      <button onClick={()=>{
        window._quizKat=kat; window._quizAnz=anz; setSeite("quiz_direct");
      }} style={{
        width:"100%",background:"linear-gradient(135deg,#1a3a22,#0d2215)",
        border:`1px solid rgba(46,204,113,0.3)`,borderRadius:10,
        padding:"13px",color:"#2ecc71",fontSize:15,cursor:"pointer",
        fontFamily:"Georgia,serif",letterSpacing:"0.06em"
      }}>
        Quiz starten → {anz} Fragen
      </button>
    </div>
  )
}

function Quiz({setSeite}){
  const kat = window._quizKat||"alle";
  const anz = window._quizAnz||20;
  
  const fragen = useMemo(()=>{
    let pool;
    if(kat==="alle") pool=ALLE_FRAGEN;
    else if(kat==="ZNS") pool=ALLE_FRAGEN.filter(f=>THEMEN.find(t=>t.id===f.k)?.block==="ZNS");
    else if(kat==="Sinnesorgane") pool=ALLE_FRAGEN.filter(f=>THEMEN.find(t=>t.id===f.k)?.block==="Sinnesorgane");
    else pool=ALLE_FRAGEN.filter(f=>f.k===kat);
    return shuffle(pool).slice(0,Math.min(anz,pool.length));
  },[]);

  const [idx,setIdx]=useState(0);
  const [gew,setGew]=useState(null);
  const [punkte,setPunkte]=useState(0);
  const [fertig,setFertig]=useState(false);
  const [verlauf,setVerlauf]=useState([]);

  const frage=fragen[idx];
  const themaInfo=THEMEN.find(t=>t.id===frage?.k);
  const proz=fragen.length>0?Math.round((punkte/fragen.length)*100):0;

  if(fertig){
    return(
      <div style={{maxWidth:800,margin:"0 auto",padding:"28px 14px",textAlign:"center"}}>
        <div style={{fontSize:50,marginBottom:12}}>{proz>=80?"🏆":proz>=60?"👍":"📖"}</div>
        <h2 style={{fontSize:22,margin:"0 0 6px"}}>Quiz beendet!</h2>
        <p style={{color:C.sub,marginBottom:20}}>{punkte} von {fragen.length} richtig</p>
        <div style={{
          display:"inline-block",
          background:proz>=80?"rgba(46,204,113,0.1)":proz>=60?"rgba(241,196,15,0.1)":"rgba(231,76,60,0.1)",
          border:`2px solid ${proz>=80?"#2ecc71":proz>=60?"#f1c40f":"#e74c3c"}`,
          borderRadius:12,padding:"12px 28px",marginBottom:24
        }}>
          <div style={{fontSize:36,fontWeight:"bold",color:proz>=80?"#2ecc71":proz>=60?"#f1c40f":"#e74c3c"}}>{proz}%</div>
          <div style={{fontSize:11,color:C.sub}}>{proz>=80?"Ausgezeichnet!":proz>=60?"Gut – weiterüben!":"Nochmal Übersicht anschauen"}</div>
        </div>
        <div style={{textAlign:"left",marginBottom:22}}>
          <h3 style={{fontSize:14,marginBottom:10,color:"#c8b090"}}>Alle Fragen + korrekte Antworten:</h3>
          {fragen.map((f,i)=>{
            const ti=THEMEN.find(t=>t.id===f.k);
            const richtig=verlauf[i]===f.r;
            return(
              <div key={i} style={{
                background:C.card,border:`1px solid ${richtig?"rgba(46,204,113,0.2)":"rgba(231,76,60,0.15)"}`,
                borderLeft:`3px solid ${richtig?"#2ecc71":"#e74c3c"}`,
                borderRadius:8,padding:"9px 13px",marginBottom:7
              }}>
                <div style={{fontSize:10,color:C.sub,marginBottom:2}}>{ti?.emoji} {ti?.titel} · Frage {i+1}</div>
                <div style={{fontSize:12,marginBottom:4}}>{f.f}</div>
                <div style={{fontSize:11,color:"#2ecc71"}}>✓ {f.a[f.r]}</div>
                {!richtig&&<div style={{fontSize:11,color:"#e74c3c"}}>✗ Deine Antwort: {f.a[verlauf[i]]}</div>}
              </div>
            )
          }}
        </div>
        <div style={{display:"flex",gap:9,justifyContent:"center",flexWrap:"wrap"}}>
          <BtnSm color="#1a2a3a" onClick={()=>setSeite("quiz_setup")}>⚙️ Neues Quiz</BtnSm>
          <BtnSm color="#1a3a22" onClick={()=>{setIdx(0);setGew(null);setPunkte(0);setFertig(false);setVerlauf([]);}}>🔄 Nochmal</BtnSm>
          <BtnSm color="#222" onClick={()=>setSeite("home")}>🏠 Home</BtnSm>
        </div>
      </div>
    )
  }

  if(!frage) return <div style={{padding:20,color:C.sub}}>Laden...</div>;

  return(
    <div style={{maxWidth:800,margin:"0 auto",padding:"18px 14px"}}>
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:11}}>
          <span style={{color:C.sub}}>Frage {idx+1} / {fragen.length}</span>
          <span style={{color:"#2ecc71"}}>✓ {punkte} richtig</span>
        </div>
        <div style={{background:"rgba(255,255,255,0.06)",borderRadius:99,height:4}}>
          <div style={{
            background:"linear-gradient(90deg,#2ecc71,#6c9ef8)",
            borderRadius:99,height:"100%",
            width:`${(idx/fragen.length)*100}%`,
            transition:"width 0.3s"
          }}/>
        </div>
        {themaInfo&&(
          <div style={{marginTop:6,display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:10}}>{themaInfo.emoji}</span>
            <span style={{fontSize:10,color:themaInfo.farbe}}>{themaInfo.titel}</span>
            <span style={{fontSize:10,color:C.sub}}>·</span>
            <span style={{fontSize:10,color:C.sub}}>{themaInfo.block}</span>
          </div>
        )}
      </div>
      <div style={{
        background:C.card,border:`1px solid ${C.border}`,
        borderRadius:12,padding:"18px",marginBottom:11
      }}>
        <div style={{fontSize:10,color:C.sub,letterSpacing:"0.1em",marginBottom:8,textTransform:"uppercase"}}>Frage</div>
        <p style={{fontSize:14,lineHeight:"1.65"}}>{frage.f}</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {frage.a.map((ans,i)=>{
          let bg=C.card,bord=C.border,tc=C.sub;
          if(gew!==null){
            if(i===frage.r){bg="rgba(46,204,113,0.1)";bord="rgba(46,204,113,0.5)";tc="#2ecc71"}
            else if(i===gew){bg="rgba(231,76,60,0.1)";bord="rgba(231,76,60,0.4)";tc="#e74c3c"}
          }
          return(
            <div key={i} onClick={()=>{
              if(gew!==null) return;
              setGew(i);
              if(i===frage.r) setPunkte(p=>p+1);
              setVerlauf(v=>[...v,i]);
            }} style={{
              background:bg,border:`1px solid ${bord}`,
              borderRadius:9,padding:"10px 14px",
              cursor:gew!==null?"default":"pointer",
              display:"flex",gap:11,alignItems:"flex-start",
              transition:"all 0.15s"
            }}>
              <span style={{color:tc,fontWeight:"bold",minWidth:20,fontSize:11,paddingTop:1}}>
                {gew!==null?(i===frage.r?"✓":i===gew?"✗":String.fromCharCode(65+i)):String.fromCharCode(65+i)}
              </span>
              <span style={{color:tc==="rgba(255,255,255,0.5)"?C.sub:tc,fontSize:12,lineHeight:"1.55"}}>{ans}</span>
            </div>
          )
        }}
      </div>
      {gew!==null&&(
        <div style={{marginTop:12,display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>{
            if(idx+1>=fragen.length){setFertig(true);}
            else{setIdx(i=>i+1);setGew(null);}
          }} style={{
            background:"linear-gradient(135deg,#1a2a3a,#0d1820)",
            border:"1px solid rgba(108,158,248,0.3)",
            color:"#6c9ef8",borderRadius:9,
            padding:"10px 22px",cursor:"pointer",
            fontFamily:"Georgia,serif",fontSize:13,letterSpacing:"0.05em"
          }}>
            {idx+1>=fragen.length?"Auswertung →":"Nächste →"}
          </button>
        </div>
      )}
    </div>
  )
}

function App(){
  const [seite,setSeite]=useState("home");
  const [aktThema,setAktThema]=useState(null);

  const nav=(s)=>setSeite(s);

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      <NavBar
        onHome={()=>nav("home")}
        seite={seite}
        onQuiz={()=>nav("quiz_setup")}
        onUebersicht={()=>nav("uebersicht")}
      />
      {seite==="home"&&<Home setSeite={setSeite} setAktThema={setAktThema}/>}
      {seite==="uebersicht"&&<Uebersicht setSeite={setSeite} setAktThema={setAktThema}/>}
      {seite==="detail"&&aktThema&&<Detail thema={aktThema} setSeite={setSeite}/>}
      {seite==="quiz_setup"&&<QuizSetup setSeite={setSeite}/>}
      {(seite==="quiz"||seite==="quiz_direct")&&<Quiz setSeite={setSeite}/>}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
